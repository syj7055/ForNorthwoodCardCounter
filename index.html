<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보드게임 유틸리티</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [count, setCount] = React.useState(10);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-sm text-center">
                        <h1 className="text-xl font-bold mb-8 text-slate-300">🃏 샘플 카드 카운터</h1>
                        
                        <div className="text-7xl font-black mb-10 text-indigo-400 drop-shadow-md">
                            {count}
                        </div>
                        
                        <div className="flex gap-4 justify-center mb-8">
                            <button 
                                onClick={() => setCount(c => Math.max(0, c - 1))}
                                className="w-1/2 py-4 bg-rose-500 hover:bg-rose-600 rounded-2xl font-bold text-xl transition-all shadow-lg active:scale-95"
                            >
                                - 사용
                            </button>
                            <button 
                                onClick={() => setCount(c => c + 1)}
                                className="w-1/2 py-4 bg-indigo-500 hover:bg-indigo-600 rounded-2xl font-bold text-xl transition-all shadow-lg active:scale-95"
                            >
                                + 복구
                            </button>
                        </div>
                        
                        <button 
                            onClick={() => setCount(10)}
                            className="text-slate-500 hover:text-slate-300 transition-colors font-medium"
                        >
                            초기화
                        </button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
