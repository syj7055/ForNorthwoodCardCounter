<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Northwood! Utility</title>
    
    <link rel="icon" type="image/png" href="Crown.png">
    <link rel="apple-touch-icon" href="Crown.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; padding: 0; user-select: none; touch-action: manipulation; 
            font-family: 'Yanone Kaffeesatz', sans-serif; 
            letter-spacing: 0.05em;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
        }
        html { scroll-behavior: smooth; }
        .theme-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .neumorphic-light { box-shadow: 8px 8px 16px #d1d5db, -8px -8px 16px #ffffff; }
        .neumorphic-dark { box-shadow: 6px 6px 14px #0a0b0e, -6px -6px 14px #1a1d26; }
        
        .progress-track-light { box-shadow: inset 3px 3px 6px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.8); }
        .progress-track-dark { box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05); }

        .progress-fill-light { box-shadow: inset -2px -2px 4px rgba(0,0,0,0.08), inset 2px 2px 4px rgba(255,255,255,0.4); }
        .progress-fill-dark { box-shadow: inset -2px -2px 4px rgba(0,0,0,0.25), inset 2px 2px 4px rgba(255,255,255,0.1); }

        @media (hover: hover) and (pointer: fine) {
            .can-hover:hover {
                transform: translateY(-4px);
                filter: brightness(1.1);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const suits = [
            { id: 'claw', name: 'Claws', icon: 'Claw.png', color: '#C7C7C7' },
            { id: 'flower', name: 'Flowers', icon: 'Flower.png', color: '#FAD9D8' },
            { id: 'eye', name: 'Eyes', icon: 'Eye.png', color: '#D1ECF3' },
            { id: 'leaf', name: 'Leaves', icon: 'Leaf.png', color: '#FEEFCE' }
        ];
        const numbers = [1, 2, 3, 4, 5, 6, 7, 8];

        const hexToRgba = (hex, alpha) => {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        function App() {
            const [usedCards, setUsedCards] = React.useState(new Set());
            const [isDark, setIsDark] = React.useState(false);
            const [trumpSuit, setTrumpSuit] = React.useState(null);

            const toggleCard = (e, suitId, num) => {
                if (navigator.vibrate) navigator.vibrate(15);
                e.currentTarget.blur(); 

                const cardKey = `${suitId}-${num}`;
                setUsedCards(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(cardKey)) newSet.delete(cardKey);
                    else newSet.add(cardKey);
                    return newSet;
                });
            };

            const toggleTrump = (suitId) => {
                if (navigator.vibrate) navigator.vibrate(20);
                setTrumpSuit(prev => prev === suitId ? null : suitId);
            };

            const reset = (e) => {
                if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
                e.currentTarget.blur();
                setUsedCards(new Set());
            };

            const getUsedCount = (suitId) => {
                let count = 0;
                numbers.forEach(num => {
                    if (usedCards.has(`${suitId}-${num}`)) count++;
                });
                return count;
            };

            const totalUsed = usedCards.size;

            return (
                <div className={`min-h-[100dvh] relative overflow-hidden flex flex-col theme-transition ${isDark ? 'bg-[#12141a] text-slate-100' : 'bg-[#e5e7eb] text-slate-700'}`}>
                    
                    <div className={`noise-bg ${isDark ? 'opacity-[0.04]' : 'opacity-[0.06]'}`}></div>

                    <div className="relative z-10 flex flex-col flex-grow items-center justify-center p-2 sm:p-4 xl:p-8 max-w-lg sm:max-w-3xl xl:max-w-4xl mx-auto w-full">
                        
                        <div className={`w-full flex justify-between items-center mb-3 sm:mb-5 xl:mb-10 pb-2 sm:pb-3 xl:pb-6 border-b-2 theme-transition ${isDark ? 'border-white/5' : 'border-black/5'}`}>
                            
                            <h1 className="text-xl sm:text-3xl xl:text-4xl font-bold tracking-wide flex items-center gap-1.5 sm:gap-2 xl:gap-3 leading-none">
                                <span className={isDark ? "text-emerald-500" : "text-emerald-700"}>🌲</span> 
                                For Northwood!
                            </h1>

                            <div className="flex gap-2 sm:gap-3 xl:gap-4 mb-1">
                                <button 
                                    onClick={(e) => { setIsDark(!isDark); e.currentTarget.blur(); }}
                                    className={`w-8 h-8 sm:w-10 sm:h-10 xl:w-12 xl:h-12 rounded-lg sm:rounded-xl xl:rounded-2xl flex items-center justify-center active:scale-90 theme-transition
                                        ${isDark ? 'neumorphic-dark' : 'neumorphic-light'}`}
                                >
                                    <div className={`w-2 h-2 sm:w-3 sm:h-3 xl:w-4 xl:h-4 rounded-full theme-transition 
                                        ${isDark ? 'bg-yellow-200 shadow-[0_0_12px_rgba(253,230,138,0.7)]' : 'bg-slate-600 shadow-inner'}`}>
                                    </div>
                                </button>
                                
                                <button 
                                    onClick={reset}
                                    className={`px-3 sm:px-5 xl:px-8 h-8 sm:h-10 xl:h-12 rounded-lg sm:rounded-xl xl:rounded-2xl text-sm sm:text-xl xl:text-2xl font-bold active:scale-95 theme-transition
                                        ${isDark ? 'neumorphic-dark text-rose-400' : 'neumorphic-light text-rose-600'}`}
                                >
                                    Reset
                                </button>
                            </div>
                        </div>

                        <div className="w-full grid grid-cols-2 gap-2 sm:gap-4 xl:gap-8">
                            {suits.map(suit => {
                                const usedCount = getUsedCount(suit.id);
                                const progressPercentage = (usedCount / 8) * 100;
                                const isTrump = trumpSuit === suit.id; 

                                const tintColor = suit.color;
                                const progressBarColor = suit.id === 'claw' ? (isDark ? '#a3a3a3' : '#B3B3B3') : suit.color;

                                const bgAlpha = isDark ? 0.25 : 0.35;  
                                const borderAlpha = isDark ? 0.7 : 0.9;

                                return (
                                    <div 
                                        key={suit.id} 
                                        className={`relative p-2.5 sm:p-5 xl:p-6 rounded-[16px] sm:rounded-[24px] xl:rounded-[36px] theme-transition
                                            ${isDark ? 'neumorphic-dark bg-[#12141a]' : 'neumorphic-light bg-[#e5e7eb]'}`}
                                    >
                                        <div 
                                            className={`absolute inset-0 rounded-[16px] sm:rounded-[24px] xl:rounded-[36px] pointer-events-none transition-all duration-500`}
                                            style={{
                                                backgroundColor: isTrump ? hexToRgba(tintColor, bgAlpha) : 'transparent',
                                                border: isTrump ? `9px solid ${hexToRgba(tintColor, borderAlpha)}` : '9px solid transparent',
                                            }}
                                        ></div>

                                        <div 
                                            className="flex items-center gap-1.5 sm:gap-2.5 xl:gap-5 mb-2 sm:mb-4 xl:mb-5 cursor-pointer group w-max relative z-10"
                                            onClick={() => toggleTrump(suit.id)}
                                        >
                                            <img src={suit.icon} alt={suit.name} className="w-5 h-5 sm:w-8 sm:h-8 xl:w-12 xl:h-12 object-contain drop-shadow-md group-hover:scale-110 transition-transform" />
                                            <span className="text-base sm:text-2xl xl:text-3xl font-bold tracking-wider relative top-[1px] xl:top-[2px] transition-colors" style={{ color: isDark ? suit.color : '#334155' }}>
                                                {suit.name}
                                            </span>
                                        </div>

                                        <div className={`relative w-full h-1.5 sm:h-2 xl:h-3 rounded-full mb-3 sm:mb-5 xl:mb-6 theme-transition ${isDark ? 'progress-track-dark bg-[#1a1d26]' : 'progress-track-light bg-[#d1d5db]'}`}>
                                            <div 
                                                className={`absolute left-0 top-0 h-full rounded-full theme-transition ${isDark ? 'progress-fill-dark' : 'progress-fill-light'}`} 
                                                style={{ width: `${progressPercentage}%`, backgroundColor: progressBarColor, opacity: isDark ? 0.9 : 1 }}
                                            ></div>
                                        </div>
                                        
                                        <div className="grid grid-cols-4 gap-1.5 sm:gap-3 xl:gap-4 relative z-10">
                                            {numbers.map(num => {
                                                const isUsed = usedCards.has(`${suit.id}-${num}`);
                                                
                                                const activeStyle = isDark
                                                    ? { backgroundColor: `${suit.color}15`, color: suit.color, borderColor: `${suit.color}50`, boxShadow: `0 4px 15px ${suit.color}10` }
                                                    : { backgroundColor: suit.color, color: '#1e293b', borderColor: 'rgba(0,0,0,0.05)', boxShadow: `0 4px 10px ${suit.color}40` };
                                                    
                                                const usedStyle = isDark
                                                    ? { backgroundColor: 'rgba(0,0,0,0.6)', color: 'rgba(255,255,255,0.08)', borderColor: 'transparent', boxShadow: 'none' }
                                                    : { backgroundColor: 'rgba(0,0,0,0.04)', color: 'rgba(0,0,0,0.15)', borderColor: 'transparent', boxShadow: 'none' };

                                                return (
                                                    <button
                                                        key={num}
                                                        onClick={(e) => toggleCard(e, suit.id, num)}
                                                        style={isUsed ? usedStyle : activeStyle}
                                                        className={`
                                                            aspect-[4/5] rounded-md sm:rounded-lg xl:rounded-xl font-bold transition-all duration-300 border
                                                            flex items-center justify-center active:scale-95
                                                            /* 💡 여기서 글자 크기를 확 키웠습니다! (기존 text-lg -> text-2xl 변경 등) */
                                                            text-2xl sm:text-4xl xl:text-5xl
                                                            ${isUsed ? 'line-through opacity-30 cursor-default' : 'can-hover shadow-sm'}
                                                        `}
                                                    >
                                                        {num}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                        
                        <div className="w-full flex justify-center mt-4 sm:mt-8 xl:mt-10">
                            <div className={`px-3 py-1.5 sm:px-6 sm:py-2.5 xl:px-8 xl:py-3 rounded-full font-bold tracking-widest text-[10px] sm:text-base xl:text-lg flex items-center gap-1.5 sm:gap-2.5 theme-transition
                                ${isDark ? 'bg-[#1a1d26] text-slate-400 shadow-[inset_2px_2px_4px_rgba(0,0,0,0.3),inset_-2px_-2px_4px_rgba(255,255,255,0.02)]' 
                                            : 'bg-[#e5e7eb] text-slate-500 shadow-[inset_2px_2px_5px_rgba(0,0,0,0.1),inset_-2px_-2px_5px_rgba(255,255,255,0.8)]'}`}>
                                <span className={`w-1.5 h-1.5 sm:w-2 sm:h-2 xl:w-2.5 xl:h-2.5 rounded-full ${isDark ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-emerald-600'}`}></span>
                                {totalUsed} / 32 CARDS PLAYED
                            </div>
                        </div>

                    </div>

                    <div className="w-full mt-auto flex flex-col items-center justify-end pb-4 sm:pb-8 xl:pb-12 pt-2">
                        <div className={`text-center text-[10px] sm:text-sm xl:text-lg tracking-[0.15em] font-semibold theme-transition ${isDark ? 'text-slate-600' : 'text-slate-400'}`}>
                            Dedicated to Jihyeon, the Queen of Northwood.
                        </div>
                    </div>

                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
