<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Northwood! Utility</title>
    
    <link rel="icon" type="image/png" href="Crown.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; user-select: none; touch-action: manipulation; font-family: system-ui, -apple-system, sans-serif; }
        html { scroll-behavior: smooth; }
        .glass-transition { transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease, box-shadow 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const suits = [
            { id: 'claw', name: 'Claw', icon: 'Claw.png', color: '#E2E2E2' },
            { id: 'flower', name: 'Flower', icon: 'Flower.png', color: '#FAD9D8' },
            { id: 'eye', name: 'Eye', icon: 'Eye.png', color: '#D1ECF3' },
            { id: 'leaf', name: 'Leaf', icon: 'Leaf.png', color: '#FEEFCE' }
        ];
        const numbers = [1, 2, 3, 4, 5, 6, 7, 8];

        function App() {
            const [usedCards, setUsedCards] = React.useState(new Set());
            const [isDark, setIsDark] = React.useState(true);

            const toggleCard = (suitId, num) => {
                const cardKey = `${suitId}-${num}`;
                setUsedCards(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(cardKey)) newSet.delete(cardKey);
                    else newSet.add(cardKey);
                    return newSet;
                });
            };

            const reset = () => {
                setUsedCards(new Set());
            };

            return (
                <div className={`min-h-screen relative overflow-hidden transition-colors duration-700 ${isDark ? 'bg-[#0f1115] text-slate-100' : 'bg-[#f8fafc] text-slate-800'}`}>
                    
                    {/* 차분한 흑백 톤의 배경 그라데이션 오라 */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        <div className={`absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-[140px] transition-all duration-1000 ${isDark ? 'bg-white/[0.04]' : 'bg-black/[0.04]'}`}></div>
                        <div className={`absolute bottom-[-20%] right-[-10%] w-[70%] h-[70%] rounded-full blur-[140px] transition-all duration-1000 ${isDark ? 'bg-slate-500/[0.05]' : 'bg-slate-400/[0.08]'}`}></div>
                    </div>

                    <div className="relative z-10 flex flex-col items-center p-4 sm:p-6 max-w-3xl mx-auto min-h-screen">
                        
                        {/* Header Area */}
                        <div className={`w-full flex justify-between items-center mb-8 mt-2 pb-4 border-b ${isDark ? 'border-white/10' : 'border-black/10'} glass-transition`}>
                            <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tighter flex items-center gap-2">
                                <span className="text-slate-400 drop-shadow-md">🌲</span> 
                                For Northwood!
                            </h1>
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setIsDark(!isDark)}
                                    className={`p-2.5 rounded-xl font-bold transition-all shadow-lg active:scale-95 border backdrop-blur-md flex items-center justify-center
                                        ${isDark ? 'bg-white/5 hover:bg-white/10 border-white/10 text-yellow-300' : 'bg-white/80 hover:bg-white border-black/10 text-indigo-500'}`}
                                >
                                    {isDark ? '☀️' : '🌙'}
                                </button>
                                <button 
                                    onClick={reset} 
                                    className={`px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg active:scale-95 border backdrop-blur-md
                                        ${isDark ? 'bg-slate-800/80 hover:bg-slate-700 border-white/10 text-slate-300' : 'bg-slate-200 hover:bg-slate-300 border-black/10 text-slate-700'}`}
                                >
                                    RESET
                                </button>
                            </div>
                        </div>

                        {/* Card Grids (2x2 Layout) */}
                        <div className="w-full grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                            {suits.map(suit => (
                                <div 
                                    key={suit.id} 
                                    className={`relative overflow-hidden p-5 sm:p-6 rounded-[32px] border backdrop-blur-2xl shadow-xl glass-transition
                                        ${isDark ? 'bg-[#181a20]/80 border-white/10' : 'bg-white border-slate-200'}`}
                                >
                                    <div className="flex items-center gap-3 mb-5 relative z-10">
                                        <img src={suit.icon} alt={suit.name} className="w-8 h-8 sm:w-10 sm:h-10 object-contain drop-shadow-sm" />
                                        <span className={`text-xl sm:text-2xl font-black tracking-tight`} style={{ color: isDark ? suit.color : '#1e293b' }}>
                                            {suit.name.toUpperCase()}
                                        </span>
                                    </div>
                                    
                                    {/* 4x2 버튼 그리드 */}
                                    <div className="grid grid-cols-4 gap-2 sm:gap-3 relative z-10">
                                        {numbers.map(num => {
                                            const isUsed = usedCards.has(`${suit.id}-${num}`);
                                            
                                            // [시인성 개선] 사용하지 않은 카드 (눈에 확 띄게)
                                            const activeStyle = isDark
                                                ? { backgroundColor: `${suit.color}15`, color: suit.color, borderColor: `${suit.color}50`, boxShadow: `0 4px 15px ${suit.color}10` }
                                                : { backgroundColor: suit.color, color: '#0f172a', borderColor: 'rgba(0,0,0,0.05)', boxShadow: `0 4px 10px ${suit.color}40` };
                                                
                                            // [시인성 개선] 사용한 카드 (배경과 동화되어 완전히 죽어보이게)
                                            const usedStyle = isDark
                                                ? { backgroundColor: 'rgba(0,0,0,0.6)', color: 'rgba(255,255,255,0.08)', borderColor: 'transparent', boxShadow: 'none' }
                                                : { backgroundColor: 'rgba(0,0,0,0.04)', color: 'rgba(0,0,0,0.15)', borderColor: 'transparent', boxShadow: 'none' };

                                            return (
                                                <button
                                                    key={num}
                                                    onClick={() => toggleCard(suit.id, num)}
                                                    style={isUsed ? usedStyle : activeStyle}
                                                    className={`
                                                        aspect-[3/4] rounded-[1rem] text-xl sm:text-2xl font-black transition-all duration-300 border backdrop-blur-sm
                                                        flex items-center justify-center active:scale-90
                                                        ${isUsed ? 'line-through opacity-30 cursor-default' : 'hover:-translate-y-1 hover:brightness-110 shadow-sm'}
                                                    `}
                                                >
                                                    {num}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Footer */}
                        <div className={`mt-auto pt-12 pb-6 text-center text-xs tracking-widest uppercase font-semibold glass-transition ${isDark ? 'text-slate-700' : 'text-slate-300'}`}>
                            Dedicated to Youngjun & Jihyun
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
