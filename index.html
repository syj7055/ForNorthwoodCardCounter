<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북쪽숲 카운터</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; user-select: none; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 4가지 문양 세팅
        const suits = [
            { id: 'claws', name: '🐾 발톱', color: 'text-amber-500', bg: 'bg-amber-500/20' },
            { id: 'leaves', name: '🌿 나뭇잎', color: 'text-emerald-500', bg: 'bg-emerald-500/20' },
            { id: 'eyes', name: '👁️ 눈', color: 'text-blue-500', bg: 'bg-blue-500/20' },
            { id: 'horns', name: '🦌 뿔', color: 'text-rose-500', bg: 'bg-rose-500/20' }
        ];
        const numbers = [1, 2, 3, 4, 5, 6, 7, 8];

        function App() {
            // 사용한 카드를 기억하는 상태 공간
            const [usedCards, setUsedCards] = React.useState(new Set());

            // 카드 클릭 시 (사용/취소 토글)
            const toggleCard = (suitId, num) => {
                const cardKey = `${suitId}-${num}`;
                setUsedCards(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(cardKey)) {
                        newSet.delete(cardKey); // 이미 쓴 카드면 취소 (실수 방지)
                    } else {
                        newSet.add(cardKey); // 안 쓴 카드면 사용 처리
                    }
                    return newSet;
                });
            };

            // 새 게임 시작 시 초기화
            const reset = () => {
                if(confirm("새 게임을 시작하시겠습니까? 모든 카운팅이 초기화됩니다.")) {
                    setUsedCards(new Set());
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 max-w-md mx-auto">
                    <div className="w-full flex justify-between items-center mb-6 mt-2">
                        <h1 className="text-2xl font-bold text-slate-100 drop-shadow-md">🌲 For Northwood!</h1>
                        <button 
                            onClick={reset} 
                            className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-bold transition-colors shadow-md active:scale-95"
                        >
                            초기화
                        </button>
                    </div>

                    <div className="w-full flex flex-col gap-5">
                        {suits.map(suit => (
                            <div key={suit.id} className="bg-slate-800 p-4 rounded-3xl border border-slate-700 shadow-xl">
                                <div className={`font-bold mb-3 ${suit.color} text-lg`}>
                                    {suit.name}
                                </div>
                                <div className="grid grid-cols-4 gap-3">
                                    {numbers.map(num => {
                                        const isUsed = usedCards.has(`${suit.id}-${num}`);
                                        return (
                                            <button
                                                key={num}
                                                onClick={() => toggleCard(suit.id, num)}
                                                className={`
                                                    py-3 rounded-2xl text-xl font-black transition-all
                                                    ${isUsed 
                                                        ? 'bg-slate-900 text-slate-700 shadow-inner' 
                                                        : `${suit.bg} ${suit.color} hover:brightness-110 shadow-lg active:scale-90 border border-white/5`}
                                                `}
                                            >
                                                {num}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
