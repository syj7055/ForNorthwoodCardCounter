<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Northwood! Utility</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; user-select: none; touch-action: manipulation; font-family: system-ui, -apple-system, sans-serif; }
        html { scroll-behavior: smooth; }
        /* 글래스모피즘 부드러운 전환을 위한 클래스 */
        .glass-transition { transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease, box-shadow 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const suits = [
            { id: 'claw', name: 'Claw', icon: 'Claw.png', color: '#E2E2E2' },
            { id: 'flower', name: 'Flower', icon: 'Flower.png', color: '#FAD9D8' },
            { id: 'eye', name: 'Eye', icon: 'Eye.png', color: '#D1ECF3' },
            { id: 'leaf', name: 'Leaf', icon: 'Leaf.png', color: '#FEEFCE' }
        ];
        const numbers = [1, 2, 3, 4, 5, 6, 7, 8];

        function App() {
            const [usedCards, setUsedCards] = React.useState(new Set());
            const [isDark, setIsDark] = React.useState(true);

            const toggleCard = (suitId, num) => {
                const cardKey = `${suitId}-${num}`;
                setUsedCards(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(cardKey)) newSet.delete(cardKey);
                    else newSet.add(cardKey);
                    return newSet;
                });
            };

            const reset = () => {
                setUsedCards(new Set());
            };

            return (
                <div className={`min-h-screen relative overflow-hidden transition-colors duration-700 ${isDark ? 'bg-[#090b10] text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
                    
                    {/* 배경 빛 번짐 (Liquid Glass 효과의 핵심) */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        <div className={`absolute top-[-15%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] transition-all duration-1000 ${isDark ? 'bg-emerald-900/30' : 'bg-emerald-300/40'}`}></div>
                        <div className={`absolute bottom-[-15%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] transition-all duration-1000 ${isDark ? 'bg-blue-900/30' : 'bg-rose-300/40'}`}></div>
                    </div>

                    <div className="relative z-10 flex flex-col items-center p-4 sm:p-6 max-w-3xl mx-auto min-h-screen">
                        
                        {/* Header Area */}
                        <div className={`w-full flex justify-between items-center mb-8 mt-2 pb-4 border-b ${isDark ? 'border-white/10' : 'border-black/10'} glass-transition`}>
                            <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tighter flex items-center gap-2">
                                <span className="text-emerald-500 drop-shadow-md">🌲</span> 
                                For Northwood!
                            </h1>
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setIsDark(!isDark)}
                                    className={`p-2.5 rounded-xl font-bold transition-all shadow-lg active:scale-95 border backdrop-blur-md flex items-center justify-center
                                        ${isDark ? 'bg-white/10 hover:bg-white/20 border-white/10 text-yellow-300' : 'bg-white/60 hover:bg-white/80 border-black/10 text-indigo-500'}`}
                                >
                                    {isDark ? '☀️' : '🌙'}
                                </button>
                                <button 
                                    onClick={reset} 
                                    className={`px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg active:scale-95 border backdrop-blur-md
                                        ${isDark ? 'bg-rose-500/20 hover:bg-rose-500/30 border-rose-500/30 text-rose-200' : 'bg-slate-800 hover:bg-slate-700 border-slate-900 text-white'}`}
                                >
                                    RESET
                                </button>
                            </div>
                        </div>

                        {/* Card Grids (2x2 Layout) */}
                        <div className="w-full grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                            {suits.map(suit => (
                                <div 
                                    key={suit.id} 
                                    className={`relative overflow-hidden p-5 sm:p-6 rounded-[32px] border backdrop-blur-2xl shadow-2xl glass-transition
                                        ${isDark ? 'bg-white/[0.03] border-white/10' : 'bg-white/60 border-white/50'}`}
                                >
                                    {/* 반투명 배경 아이콘 */}
                                    <img src={suit.icon} alt="" className={`absolute -right-6 -bottom-6 w-36 h-36 pointer-events-none transition-opacity duration-500 ${isDark ? 'opacity-[0.04]' : 'opacity-10'}`} />

                                    <div className="flex items-center gap-3 mb-5 relative z-10">
                                        <img src={suit.icon} alt={suit.name} className="w-8 h-8 sm:w-10 sm:h-10 object-contain drop-shadow-md" />
                                        <span className={`text-xl sm:text-2xl font-black tracking-tight ${isDark ? '' : 'drop-shadow-sm'}`} style={{ color: isDark ? suit.color : '#1e293b' }}>
                                            {suit.name.toUpperCase()}
                                        </span>
                                    </div>
                                    
                                    {/* 4x2 버튼 그리드 (2x2 화면 배열에 맞춰 최적화) */}
                                    <div className="grid grid-cols-4 gap-2 sm:gap-3 relative z-10">
                                        {numbers.map(num => {
                                            const isUsed = usedCards.has(`${suit.id}-${num}`);
                                            
                                            // 다크모드/라이트모드에 따른 동적 테마 색상 적용
                                            const activeStyle = isDark
                                                ? { backgroundColor: `${suit.color}15`, color: suit.color, borderColor: `${suit.color}40`, boxShadow: `0 4px 15px ${suit.color}10` }
                                                : { backgroundColor: suit.color, color: '#0f172a', borderColor: 'transparent', boxShadow: `0 4px 10px ${suit.color}80` };
                                                
                                            const usedStyle = isDark
                                                ? { backgroundColor: 'rgba(0,0,0,0.4)', color: 'rgba(255,255,255,0.15)', borderColor: 'transparent', boxShadow: 'inset 0 4px 10px rgba(0,0,0,0.5)' }
                                                : { backgroundColor: 'rgba(0,0,0,0.06)', color: 'rgba(0,0,0,0.2)', borderColor: 'transparent', boxShadow: 'inset 0 2px 5px rgba(0,0,0,0.05)' };

                                            return (
                                                <button
                                                    key={num}
                                                    onClick={() => toggleCard(suit.id, num)}
                                                    style={isUsed ? usedStyle : activeStyle}
                                                    className={`
                                                        aspect-[3/4] rounded-[1rem] text-xl sm:text-2xl font-black transition-all duration-300 ease-out border backdrop-blur-sm
                                                        flex items-center justify-center active:scale-90
                                                        ${isUsed ? 'line-through opacity-70' : 'hover:-translate-y-1 hover:brightness-110'}
                                                    `}
                                                >
                                                    {num}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Footer */}
                        <div className={`mt-auto pt-12 pb-6 text-center text-xs tracking-widest uppercase font-semibold glass-transition ${isDark ? 'text-slate-600' : 'text-slate-400'}`}>
                            Dedicated to Youngjun & Jihyun
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
